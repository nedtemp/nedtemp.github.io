<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Vertical Grid</title>

        <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="imagenes/favico.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            color: #f5f3d7;
            background-color:#000 ;
            height: 100%;
            
        }


        .grid-container {
            position: relative;
            margin: 0 auto;
            display: grid;
            grid-template-rows: 8% 60% 24% 8%;
            height: 100vh;
            }

            .nav {
                max-width: 100%;

                /*background-color: #f2f2f2;*/
                max-width: 60%;
                display: flex;
                list-style: none;
                justify-content: space-evenly;
                align-items: center;
            }

                .nav a{
                    text-decoration: none;
                    font-size: 1.5em;
                    color: #000;
                    color: #f5f3d7;
                }

                .nav a:hover{
                    background-color: #f5f3d7;
                    color: #000;
                }

            .image {
                /*background-color: #e5e5e5;*/
                display: flex;
                justify-content: space-evenly;
                align-items: center;
            }

                .image img{
                    height: 91%;
                }

            .menu {
                /*background-color: #cccccc;*/
                max-width: 100%;
                display: flex;
                flex-direction: column;
                
                justify-content: space-evenly;
                align-items: center;
                flex-wrap: no-wrap;
                text-align: center;

                overflow-wrap: break-word;
            }

                .menu a{
                    text-decoration: none;
                    color: #f5f3d7;
                    font-size: 3em;
                    font-weight: 900;
                    font-style: normal;
                    overflow-wrap: break-word;
        }


                .menu a:hover {
                    color: #000;
                    background-color: #f5f3d7;

                }


            .footer {
                max-width: 100%;
                /*background-color: #b8b8b8;*/
                display: flex;
                justify-content: space-evenly;
            }

             .gif{
                position: absolute;
                width: 9em;
                left: 56%;
                TOP: 5%;
              }



    </style>
</head>
<body>

    <div class="PC">

    <div class="foto">
            
    </div>

    <div class="grid-container">
        <nav class="nav">
            <a href="#"><li><i class="fa-brands fa-instagram"></i></li></a>
            <a href="#"><li><i class="fa-solid fa-envelope"></i></li></a>
            <a href="#"><li><i class="fa-brands fa-paypal"></i></li></a>
        </nav>

        <div class="image">
            <img src="imagenes/peyergriffin.png">
        </div>
                
        <div class="menu">
            <a href="8.html">ALEATORIO</a>
            <a href="3.html">RECIENTE</a>
            <a href="about.html">ABOUT</a>
        </div>

        <footer class="footer" style="max-width: 100%; margin: auto;">
            <img style="max-width: 100%; height: auto;" src="imagenes/svgg.png" alt="Descripción de la imagen">
        </footer>

        <div>
            <img class="gif" src="imagenes/gifweb.gif">
        </div>
    </div>
</div>

<script></script>>
</body>
</html>
