    <style>
        body{
            font-family: 'Quattrocento Sans', sans-serif;
            background: #000;
            font-size: 20px;
        }

        .content{
            background: #000;
            width: 100%;
            height: 100%;
            position: absolute;
        }


        .nav {
            max-width: 50%;
            height: 8%;
            list-style: none;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            font-size: 1.5em;
        }

        .nav a{
            padding-top: 4%;
            text-decoration: none;
            color: #f5f3d7;
        }

        .nav a:hover {
            color: #000;
        }

        .image{
            height: 50%;
            max-width: 100%;
            display: flex;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        .image img{
            margin: auto, 0px;
            max-height: 85%;
        }

        .menu{
            height: 30%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            font-size: 2em;
            line-height: 1em;
        }

        .menu a{
            font-weight: 700;
            text-decoration: none;
            color: #f5f3d7;
        }

        .menu a:hover {
            color: #000;
            background: #f5f3d7;
        }

        .footer{
            height: 12%;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer img{
            height: 30%;
        }

        .relative {
            width: 30%;
            position: relative; 
            top: -90%;
            right: -60%;
            overflow: hidden;
        }

        .relative img{
            width: 100%;
        }



@media screen and (min-width: 768px) {
    body {
        font-size: 14px;
        background-image: url(imagenes/fotosfan.png);
        background-size: cover;
    }

        .content{
            margin: 0px auto;
            width: 40%;
            height: 100vh;
            position: absolute;
        }

}



    </style>
</head>
<body>
<div class="content">

        <nav class="nav">

        </nav>

        <div class="image">

            <div><a href="about.html">ABOUT</a></div>
        </div>

        <footer class="footer">
            <img src="imagenes/nedfonts.png" alt="Descripción de la imagen">
        </footer>

        


<div class="relative">
    <img src="imagenes/gifweb.gif">
</div>

</div>
