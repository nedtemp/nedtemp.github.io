    <title>Vertical Grid</title>

    <!-- GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Quattrocento Sans', sans-serif;
        }

        .content{
            width: 100%;
            height: 100vh;
            position: absolute;
        }


        .nav {
            max-width: 60%;
            height: 7%;
            list-style: none;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        .nav a{
            text-decoration: none;
            color: #000;

        }

        .image{
            height: 55%;
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image img{
            max-height: 90%;
        }

        .menu{
            height: 31%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            text-align: center;
            font-size: 3em;
            line-height: 40px;
        }

        .menu a{
            
            font-weight: 700;
            text-decoration: none;
            color: #000;

        }

        .footer{
            height: 7%;
            max-width: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer img{
            height: 90%;
        }

@media screen and (min-width: 768px) {
    body {
        font-size: 14px;
    }

        .content{
            margin: 0px auto;
            width: 40%;
            height: 100vh;
            position: absolute;
        }

}



    </style>
</head>
<body>
<div class="content">

        <nav class="nav">
            <a href="#"><li><i class="fa-brands fa-instagram"></i></li></a>
            <a href="#"><li><i class="fa-solid fa-envelope"></i></li></a>
            <a href="#"><li><i class="fa-brands fa-paypal"></i></li></a>
        </nav>

        <div class="image">
            <img src="imagenes/peyergriffin.png">
        </div>
                
        <div class="menu">
            <div><a href="8.html">ALEATORIO</a></div>
            <div><a href="3.html">RECIENTE</a></div>
            <div><a href="about.html">INDEX</a></div>
            <div><a href="about.html">ABOUT</a></div>
        </div>

        <footer class="footer" style="max-width: 100%; margin: auto;">
            <img style="max-width: 100%; height: auto;" src="imagenes/svgg.png" alt="Descripción de la imagen">
        </footer>

        
</div>

<div style="position: absolute; width: 100vw; height: 100vh;  overflow: hidden;">
<img style="position: relative; width: 20%; top: 20%; left: 90%; transform: translate(-50%, -50%);" src="imagenes/gifweb.gif">    
</div>
